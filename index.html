<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Firemní stránka</title>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: auto; padding: 2em; }
    button { 
        padding: 0.6em 1.2em; 
        background-color: #007BFF;  /* Modrá barva */
        color: white; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer;
        margin: 10px;
        font-size: 16px;
        text-align: center;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #0056b3;  /* Tmavší modrá při hover */
    }
    #search {
        width: 100%;
        padding: 0.5em;
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        padding: 0.8em;
        text-align: left;
        border: 1px solid #ddd;
    }
    th {
        background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <h1>🤖 Ing. Libor Kocián - Chytrá řešení pro automatizaci, digitalizaci, inovace⚙️</h1>
  <h2>💡 Úvodní analýza vašeho podniku zdarma!</h2>

  <input type="text" id="search" placeholder="🔍 Hledat...">

  <div id="buttons-container">
      <button onclick="window.location.href='html/10_uvod.html'">UVOD</button>
      <button onclick="window.location.href='html/20_automatizace.html'">AUTOMATIZACE</button>
      <button onclick="window.location.href='html/25_digitalizace.html'">DIGITALIZACE</button>
      <button onclick="window.location.href='html/30_inovace.html'">INOVACE</button>
      <button onclick="window.location.href='html/40_iot.html'">IOT</button>
      <button onclick="window.location.href='html/60_kontakty.html'">KONTAKTY</button>

  </div>

  <script>
    const searchInput = document.getElementById('search');
    const buttons = document.querySelectorAll('button');

    searchInput.addEventListener('input', function () {
      const query = this.value.toLowerCase();
      buttons.forEach(button => {
        const text = button.innerText.toLowerCase();
        button.style.display = text.includes(query) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
