<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Firemní stránka</title>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: auto; padding: 2em; }
    button { padding: 0.3em 0.6em; }
  </style>
</head>
<body>
  <h1>📚 Firemní dokumentace</h1>

  <input type="text" id="search" placeholder="🔍 Hledat...">
  <table>
    <thead>
      <tr>
        <th>Návod</th>
        <th>Poslední úprava</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><a href="html/kontakty.html">kontakty</a></td>
        <td></td>
      </tr>
      <tr>
        <td><a href="html/uvod.html">uvod</a></td>
        <td>Sat Apr 4 23:23:18 2026 +0200</td>
      </tr>
      <tr>
        <td><a href="html/uvodek.html">uvodek</a></td>
        <td>Sat Apr 4 23:32:30 2026 +0200</td>
      </tr>
    </tbody>
  </table>

  <script>
    const searchInput = document.getElementById('search');
    const rows = document.querySelectorAll('tbody tr');

    searchInput.addEventListener('input', function () {
      const query = this.value.toLowerCase();
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(query) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
